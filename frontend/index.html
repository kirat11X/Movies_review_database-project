<body>
    <header>
    <section class="top">
    <div class="topnav">
        <a class="active" href="#"><img id="logo" src="logo.png" alt="Logo"></a>
        <div class="search-container">
            <form role="search" id="form">
                <input id="search-input" type="search" placeholder="Search.." name="search">
                <button id="submit-button" type="submit" >><i class="fa fa-search"></i></button>
            </form>
        </div>
    </div>
    </section>
    </header>
    <main>
        <section class="banner" id="summary">
            <h1>Welcome to Movie Site</h1>
            <p>Discover the latest movies and TV shows.</p>
        </section>

        <section class="filters">
            <!-- menu options  -->
            <label for="filter">Filter by:</label>
            <select id="filter" name="filter">
                <option value="popularity">Popularity</option>
                <option value="release_date">Release Date</option>
                <option value="rating">Rating</option>
            </select>

            <label for="order">Order:</label>
            <select id="order" name="order">
                <option value="ascending">Ascending</option>
                <option value="descending">Descending</option>
            </select>
        </section>
